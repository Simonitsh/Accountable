    <!-- Anti-flash theme initializer: applies stored theme before first paint -->
    <script>
      (function () {
        var theme = localStorage.getItem('cumulative-theme') || 'dark';
        var root = document.documentElement;
        if (theme === 'light') {
          root.classList.remove('dark');
          root.classList.add('light');
        } else {
          root.classList.add('dark');
          root.classList.remove('light');
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-DfwObWPw.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DFXC-YYl.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // If a new service worker is waiting, activate it immediately.
            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            reg.addEventListener('updatefound', () => {
              const newSW = reg.installing;
              if (newSW) {
                newSW.addEventListener('statechange', () => {
                  if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                    newSW.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              }
            });
          }).catch(() => {});

          // Reload the page whenever a new SW takes control so we always
          // run the latest version with a fully fresh network fetch.
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
